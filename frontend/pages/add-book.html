<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi libro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>Aggiungi un libro</h1>
    <p>Inserisci un volume della tua collezione privata</p>

    <nav class="nav-buttons">
        <a href="index.html" class="button-link">Home</a>
        <a href="map.html" class="button-link">Mappa</a>
        <a href="dashboard.html" class="button-link">Dashboard</a>
    </nav>
</header>

<main class="container">
    <section class="card full-width add-book-card">
        <h2>Nuovo libro</h2>

        <form 
            action="../../backend/books/add_book.php" 
            method="POST" 
            enctype="multipart/form-data"
            class="book-form"
        >
            <div class="form-grid">
                <div class="form-group">
                    <label>Titolo *</label>
                    <input type="text" name="titolo" placeholder="Es. Storia di Aversa" required>
                </div>

                <div class="form-group">
                    <label>Autore *</label>
                    <input type="text" name="autore" placeholder="Es. Mario Rossi" required>
                </div>

                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" name="isbn" placeholder="Es. 9788800000000" maxlength="20">
                </div>

                <div class="form-group">
                    <label>Anno</label>
                    <input type="number" name="anno" placeholder="Es. 2020" min="1000" max="2100">
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select name="categoria">
                        <option value="">Seleziona categoria</option>
                        <option value="Storia locale">Storia locale</option>
                        <option value="Letteratura">Letteratura</option>
                        <option value="Narrativa">Narrativa</option>
                        <option value="Saggistica">Saggistica</option>
                        <option value="Informatica">Informatica</option>
                        <option value="Arte">Arte</option>
                        <option value="Altro">Altro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Copertina</label>
                    <input type="file" name="cover" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label>Descrizione</label>
                <textarea name="descrizione" placeholder="Aggiungi una breve descrizione del volume"></textarea>
            </div>

            <button type="submit">Salva libro</button>
        </form>
    </section>
</main>

</body>
</html>
