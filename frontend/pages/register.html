<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>Registrazione</h1>
    <p>Crea un nuovo account</p>

    <nav class="nav-buttons">
        <a href="index.html" class="button-link">🏠 Home</a>
        <a href="login.html" class="button-link">Login</a>
    </nav>
</header>

<main class="container">
    <section class="card full-width register-card">

        <h2>Crea il tuo account</h2>

        <form action="../../backend/auth/register.php" method="POST" class="register-form">

            <div class="form-grid">

                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" name="nome" required>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Comune *</label>
                    <select name="comune" required>
                        <option value="">Seleziona un comune</option>
                        <option>Aversa</option>
                        <option>Carinaro</option>
                        <option>Casaluce</option>
                        <option>Cesa</option>
                        <option>Frignano</option>
                        <option>Gricignano di Aversa</option>
                        <option>Lusciano</option>
                        <option>Orta di Atella</option>
                        <option>Parete</option>
                        <option>San Cipriano d'Aversa</option>
                        <option>San Marcellino</option>
                        <option>Sant'Arpino</option>
                        <option>Succivo</option>
                        <option>Teverola</option>
                        <option>Villa di Briano</option>
                    </select>
                </div>

            </div>

            <!-- CAMPI NASCOSTI GEO -->
            <input type="hidden" name="latitudine" id="latitudine">
            <input type="hidden" name="longitudine" id="longitudine">

            <div class="geo-box">
                <p id="geo-status">📍 Rilevamento posizione in corso...</p>
                <button type="button" onclick="getLocation()" class="button-link small">
                    Rileva posizione manualmente
                </button>
            </div>

            <button type="submit">Registrati</button>

        </form>
    </section>
</main>

<script>
function getLocation() {
    const status = document.getElementById("geo-status");

    if (!navigator.geolocation) {
        status.innerHTML = "❌ Geolocalizzazione non supportata.";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(position) {
            document.getElementById("latitudine").value = position.coords.latitude;
            document.getElementById("longitudine").value = position.coords.longitude;

            status.innerHTML = "✅ Posizione rilevata correttamente";
        },
        function(error) {
            status.innerHTML = "⚠️ Impossibile ottenere la posizione";
        }
    );
}

// AUTO AVVIO
getLocation();
</script>

</body>
</html>
