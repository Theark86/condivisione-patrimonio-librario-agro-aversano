<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h1>Dashboard</h1>
</header>

<main class="container">

    <div class="card">
        <h3>Totale libri</h3>
        <p id="books-count"></p>
    </div>

    <div class="card">
        <h3>Totale utenti</h3>
        <p id="users-count"></p>
    </div>

    <div class="card">
        <h3>Richieste</h3>
        <p id="requests-count"></p>
    </div>

    <div class="card full-width">
        <h3>Libri più visualizzati</h3>
        <canvas id="chart"></canvas>
    </div>

</main>

<script src="../js/dashboard.js"></script>

</body>
</html>
