<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard statistiche</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="dashboard-header">
    <h1>Dashboard statistiche</h1>
    <p>Monitoraggio dei dati principali della piattaforma</p>

    <nav class="nav-buttons">
        <a href="index.html" class="button-link">Home</a>
        <a href="add-book.html" class="button-link">Aggiungi libro</a>
        <a href="map.html" class="button-link">Mappa</a>
    </nav>
</header>

<main class="dashboard-layout">

    <section class="stat-card">
        <span class="stat-label">Totale libri</span>
        <strong id="books-count">0</strong>
    </section>

    <section class="stat-card">
        <span class="stat-label">Totale utenti</span>
        <strong id="users-count">0</strong>
    </section>

    <section class="stat-card">
        <span class="stat-label">Richieste</span>
        <strong id="requests-count">0</strong>
    </section>

    <section class="card chart-card">
        <h2>Libri più visualizzati</h2>
        <p class="chart-description">
            Il grafico mostra i volumi che hanno ricevuto più consultazioni.
        </p>
        <canvas id="chart"></canvas>
    </section>

</main>

<script src="../js/dashboard.js"></script>

</body>
</html>
